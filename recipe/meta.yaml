{% set name = "patch" %}
{% set version = "2.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://ftp.gnu.org/gnu/patch/patch-{{ version }}.tar.gz
  sha256: 308a4983ff324521b9b21310bfc2398ca861798f02307c79eb99bb0e0d2bf980
  patches:
    # TODO: Figure out why fedora/suse/debian don't need this
    - 0001-Relax-open-fds-count-for-deep-directories.patch  # [linux]

build:
  number: 0
  skip: True  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - libtool
test:
  commands:
    - patch --help
  files:
    - testfile
    - testfile2
    - testfile.patch

about:
  home: https://savannah.gnu.org/projects/patch
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: This is GNU patch, which applies diff files to original files.
  description: |
    Patch takes a patch file containing a difference listing produced by the
    diff program and applies those differences to one or more original files,
    producing patched versions.
  dev_url: https://git.savannah.gnu.org/git/patch.git
  doc_url: https://savannah.gnu.org/projects/patch

extra:
  recipe-maintainers:
    - nehaljwani
